    <script>
        function BookClick(){
            document.getElementById("btnContainer").style.display="none";
            document.getElementById("summaryContainer").style.display="block";


            document.getElementById("lblMovie").textContent=document.getElementById("lstMovies").value;
            document.getElementById("lblDate").textContent=document.getElementById("txtDate").value;
            document.getElementById("lblTiming").textContent=document.getElementById("lstTiming").value;
            document.getElementById("lblCinema").textContent=document.getElementById("lstCinema").value;
            
            var movieName = document.getElementById("lstMovies").value;
             var imgPoster = document.getElementById("imgPoster");
             
             if(movieName=="Tere Ishk"){
                imgPoster.src="../public/images/movie.png";

             }else{
                imgPoster.src="../public/images/movie2.png";
             }


        }
        function ModifyClick(){
            document.getElementById("modalTitle").textContent="Modify Booking";
            document.getElementById("btnBook").innerHTML = "Save";
            document.getElementById("btnBook").className="btn btn-success";
        }
    </script>
</head>
<body class="container-fluid">
    <div class="mt-2"id="btnContainer">
        <button class="btn btn-primary"data-bs-toggle="modal"data-bs-target="#Booking">Quick Book</button>
    </div>
    <div class="modal fad"id="Booking">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Quick Book</h2>
                    <button class="btn-close"data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div>
                            <select class="form-select"id="lstMovies">
                                <option>Select Movie</option>
                                <option>Tere Ishk</option>
                                <option>Param Sundari</option>
                             </select>
                           </div>
                        <div>
                            <input type="date"class="form-control"value="date"id="txtDate">
                            </div>
                        <div>
                            <select class="form-select"id="lstCinema">
                                <option>Select Cinema</option>
                                <option>Inox Hills</option>
                                <option>PVR AMEERPET</option>
                            </select>
                        </div>
                        <div>
                            <select class="form-select"id="lstTiming">
                                <option>select timing</option>
                                <option>10:20 AM</option>
                                <option>04:45</option>

                            </select>
                        </div>
                        <div>
                            <button id="btnBook"onclick="BookClick()"data-bs-dismiss="modal"class="btn btn-primary">Book</button>
                        </div>
                    
                </div>
            </div>
        </div>
    </div>
    <div class="mt-3 w-25" id="summaryContainer"style="display:none;">
        <h4 class="bi bi-ticket">Your Booking summary</h4>
        <dl>
            <img id="imgPoster"width="100%"height="250">
            <dt>Movie Name</dt>
            <dd id="lblMovie"></dd>
            <dt>Date</dt>
            <dd id="lblDate"></dd>
            <dt>Cinema</dt>
            <dd id="lblCinema"></dd>
            <dt>Timing</dt>
            <dd id="lblTiming"></dd>
            

        </dl>
        <button onclick="ModifyClick()" data-bs-target="#Booking" data-bs-toggle="modal"class="btn btn-warning bi bi-pen-fill w-100">Modify Booking</button>

    </div>
